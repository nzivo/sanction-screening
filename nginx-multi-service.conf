# Complete Nginx Configuration for Multiple Services
# Server IP: 134.209.176.80
# Location: /etc/nginx/sites-available/multi-service

# Upstream definitions for better performance
upstream sanctions_backend {
    server localhost:8001;
}

upstream cbk_gdi_backend {
    server localhost:8002;  # Change to your CBK GDI port
}

upstream payment_backend {
    server localhost:8003;  # Change to your Payment service port
}

server {
    listen 80;
    server_name 134.209.176.80;

    # Increase buffer sizes for larger payloads
    client_max_body_size 100M;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # Root path - can show a landing page with links to all services
    location = / {
        return 200 '<!DOCTYPE html>
<html>
<head>
    <title>Services Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .service { background: #f5f5f5; padding: 20px; margin: 10px 0; border-radius: 5px; }
        .service h2 { margin-top: 0; color: #0066cc; }
        a { color: #0066cc; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Available Services</h1>
    
    <div class="service">
        <h2>Sanctions Screening System</h2>
        <p>Comprehensive sanctions and PEP screening service</p>
        <a href="/sanctions">Access Dashboard</a> | 
        <a href="/sanctions/docs">API Documentation</a>
    </div>
    
    <div class="service">
        <h2>CBK GDI Service</h2>
        <p>Central Bank of Kenya GDI System</p>
        <a href="/cbk-gdi">Access System</a>
    </div>
    
    <div class="service">
        <h2>Payment Service</h2>
        <p>Payment processing and management</p>
        <a href="/payment">Access Dashboard</a>
    </div>
</body>
</html>';
        add_header Content-Type text/html;
    }

    # ============================================================
    # SANCTIONS SCREENING SERVICE
    # Accessible at: http://134.209.176.80/sanctions
    # ============================================================
    
    location /sanctions {
        alias /var/www/sanction-screening/frontend/dist;
        try_files $uri $uri/ /sanctions/index.html;
        index index.html;
        
        # CORS headers if needed
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }

    location /sanctions/api/ {
        rewrite ^/sanctions/api/(.*) /$1 break;
        proxy_pass http://sanctions_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /sanctions/docs {
        rewrite ^/sanctions/docs$ /docs break;
        proxy_pass http://sanctions_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /sanctions/redoc {
        rewrite ^/sanctions/redoc$ /redoc break;
        proxy_pass http://sanctions_backend;
        proxy_set_header Host $host;
    }

    location /sanctions/openapi.json {
        rewrite ^/sanctions/openapi.json$ /openapi.json break;
        proxy_pass http://sanctions_backend;
        proxy_set_header Host $host;
    }

    # ============================================================
    # CBK GDI SERVICE
    # Accessible at: http://134.209.176.80/cbk-gdi
    # ============================================================
    
    # If CBK GDI is a static frontend
    location /cbk-gdi {
        alias /var/www/cbk-gdi/build;  # Change to your CBK GDI path
        try_files $uri $uri/ /cbk-gdi/index.html;
        index index.html;
    }

    # If CBK GDI has an API
    location /cbk-gdi/api/ {
        rewrite ^/cbk-gdi/api/(.*) /$1 break;
        proxy_pass http://cbk_gdi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # PAYMENT SERVICE
    # Accessible at: http://134.209.176.80/payment
    # ============================================================
    
    # If Payment is a static frontend
    location /payment {
        alias /var/www/payment-service/build;  # Change to your Payment service path
        try_files $uri $uri/ /payment/index.html;
        index index.html;
    }

    # If Payment has an API
    location /payment/api/ {
        rewrite ^/payment/api/(.*) /$1 break;
        proxy_pass http://payment_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # GENERAL SETTINGS
    # ============================================================
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

